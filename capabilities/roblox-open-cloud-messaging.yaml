naftiko: 1.0.0-alpha2
info:
  label: Roblox Open Cloud API — Messaging
  description: 'Roblox Open Cloud API — Messaging. 1 operations. Lead operation: Publish Message. Self-contained Naftiko capability
    covering one Roblox Engine Api business surface.'
  tags:
  - Roblox Engine Api
  - Messaging
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ROBLOX_ENGINE_API_API_KEY: ROBLOX_ENGINE_API_API_KEY
capability:
  consumes:
  - type: http
    namespace: roblox-open-cloud-messaging
    baseUri: https://apis.roblox.com
    description: Roblox Open Cloud API — Messaging business capability. Self-contained, no shared references.
    resources:
    - name: messaging-service-v1-universes-universeId-topics-topic
      path: /messaging-service/v1/universes/{universeId}/topics/{topic}
      operations:
      - name: publishmessage
        method: POST
        description: Publish Message
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: universeId
          in: path
          type: string
          required: true
        - name: topic
          in: path
          type: string
          description: The message topic name (max 80 characters)
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: apikey
      key: x-api-key
      value: '{{env.ROBLOX_ENGINE_API_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: roblox-open-cloud-messaging-rest
    port: 8080
    description: REST adapter for Roblox Open Cloud API — Messaging. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/messaging-service/v1/universes/{universeid}/topics/{topic}
      name: messaging-service-v1-universes-universeid-topics-topic
      description: REST surface for messaging-service-v1-universes-universeId-topics-topic.
      operations:
      - method: POST
        name: publishmessage
        description: Publish Message
        call: roblox-open-cloud-messaging.publishmessage
        with:
          universeId: rest.universeId
          topic: rest.topic
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: roblox-open-cloud-messaging-mcp
    port: 9090
    transport: http
    description: MCP adapter for Roblox Open Cloud API — Messaging. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: publish-message
      description: Publish Message
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: roblox-open-cloud-messaging.publishmessage
      with:
        universeId: tools.universeId
        topic: tools.topic
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
